<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="black" stroke-width="2">

  <!-- Outer shape (L building) -->
  <path d="
    M50 50
    H300
    V250
    H700
    V450
    H50
    Z
  "></path>

  <!-- Vertical hallway -->
  <rect x="200" y="50" width="100" height="200"></rect>

  <!-- Horizontal hallway -->
  <rect x="200" y="200" width="500" height="100"></rect>

  <!-- Left vertical rooms -->
  <rect id="room-1" x="50" y="50" width="150" height="100"></rect>
  <rect id="room-2" x="50" y="150" width="150" height="100"></rect>

  <!-- Small rooms (bathrooms) -->
  <rect id="room-3" x="50" y="250" width="75" height="100"></rect>
  <rect id="room-4" x="125" y="250" width="75" height="100"></rect>

  <!-- Bottom rooms (long hallway) -->
  <rect id="room-5" x="200" y="300" width="125" height="150"></rect>
  <rect id="room-6" x="325" y="300" width="125" height="150"></rect>
  <rect id="room-7" x="450" y="300" width="125" height="150"></rect>
  <rect id="room-8" x="575" y="300" width="125" height="150"></rect>

  <!-- Top rooms (long hallway) -->
  <rect id="room-9" x="200" y="200" width="100" height="100"></rect>
  <rect id="room-10" x="300" y="200" width="100" height="100"></rect>
  <rect id="room-11" x="400" y="200" width="100" height="100"></rect>
  <rect id="room-12" x="500" y="200" width="100" height="100"></rect>
  <rect id="room-13" x="600" y="200" width="100" height="100"></rect>

  <!-- Door openings (simple gaps using white lines) -->
  
  <!-- Vertical hallway doors -->
  <line x1="200" y1="100" x2="200" y2="130" stroke="white" stroke-width="4"></line>
  <line x1="200" y1="180" x2="200" y2="210" stroke="white" stroke-width="4"></line>

  <!-- Bottom hallway doors -->
  <line x1="250" y1="300" x2="280" y2="300" stroke="white" stroke-width="4"></line>
  <line x1="375" y1="300" x2="405" y2="300" stroke="white" stroke-width="4"></line>
  <line x1="500" y1="300" x2="530" y2="300" stroke="white" stroke-width="4"></line>
  <line x1="625" y1="300" x2="655" y2="300" stroke="white" stroke-width="4"></line>

  <!-- Top hallway doors -->
  <line x1="250" y1="200" x2="280" y2="200" stroke="white" stroke-width="4"></line>
  <line x1="350" y1="200" x2="380" y2="200" stroke="white" stroke-width="4"></line>
  <line x1="450" y1="200" x2="480" y2="200" stroke="white" stroke-width="4"></line>
  <line x1="550" y1="200" x2="580" y2="200" stroke="white" stroke-width="4"></line>
  <line x1="650" y1="200" x2="680" y2="200" stroke="white" stroke-width="4"></line>
</svg>